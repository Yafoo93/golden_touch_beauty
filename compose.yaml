services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: golden_touch_beauty
      POSTGRES_USER: golden_touch
      POSTGRES_PASSWORD: golden_touch_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_touch -d golden_touch_beauty"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

